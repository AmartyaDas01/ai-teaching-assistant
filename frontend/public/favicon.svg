<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="AI Teaching Assistant">
  <!-- Mercury theme: near-black tile with a thin luminous edge, matching the app shell -->
  <rect width="64" height="64" rx="14" fill="#0A0A0A"/>
  <rect x="0.75" y="0.75" width="62.5" height="62.5" rx="13.25" fill="none"
        stroke="#FFFFFF" stroke-opacity="0.18" stroke-width="1.5"/>

  <!-- Graduation cap. Solid shapes, inset from the edges so it stays readable at 16px. -->
  <g fill="#FFFFFF">
    <!-- mortarboard -->
    <path d="M32 17 L53 27 L32 37 L11 27 Z"/>
    <!-- cap beneath the board -->
    <path d="M21.5 30.5 v7.8 c0 3.6 4.7 6.1 10.5 6.1 s10.5 -2.5 10.5 -6.1 v-7.8 l-10.5 5 z"/>
    <!-- tassel -->
    <rect x="48.4" y="28.6" width="2.8" height="11.4" rx="1.4"/>
    <circle cx="49.8" cy="42.6" r="3"/>
  </g>
</svg>
