# Render Blueprint — backend API + managed Postgres.
# In production the LLM is OpenAI (Ollama can't run on Render), so set OPENAI_API_KEY.
# Embeddings stay local (sentence-transformers) inside the container.

services:
  - type: web
    name: ai-ta-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: starter # torch/sentence-transformers need more than the free tier
    healthCheckPath: /health # FastAPI exposes GET /health for Render's probe
    disk:
      name: data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ai-ta-db
          property: connectionString
      - key: OPENAI_API_KEY
        sync: false # set this in the Render dashboard
      - key: OPENAI_MODEL
        value: gpt-4o
      - key: LLM_PROVIDER
        value: openai
      - key: EMBEDDING_PROVIDER
        value: local
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: CHROMA_PERSIST_DIR
        value: /data/chroma
      - key: UPLOAD_DIR
        value: /data/uploads
      # CORS: the backend also allows any *.onrender.com origin via regex (see
      # main.py), so this only needs changing if you add a custom domain.
      - key: FRONTEND_ORIGIN
        value: https://ai-ta-frontend.onrender.com

  # Frontend — static site (Vite build served from Render's CDN).
  - type: web
    name: ai-ta-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      # Baked into the Vite build. Render resolves this to the backend's host
      # (no scheme); api.ts prepends https://. Auto-wired — no manual copy.
      - key: VITE_API_URL
        fromService:
          type: web
          name: ai-ta-backend
          property: host
    routes:
      # SPA fallback so React Router deep links resolve to index.html.
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: ai-ta-db
    plan: starter
