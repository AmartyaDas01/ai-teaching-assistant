# Render Blueprint — free-tier deploy, fully persistent.
#
# Everything runs on free plans, and nothing is lost on restart:
#   - LLM + embeddings : OpenAI (OpenAI embeddings mean the local torch model never
#                        loads, so the backend fits Render's free 512MB tier)
#   - vectors          : Qdrant Cloud (free 1GB) — remote, so they survive the free
#                        tier's lack of a persistent disk
#   - Postgres         : Neon (free, permanent) — Render's free DB expires in ~90d
#
# Set these three secrets in the Render dashboard: OPENAI_API_KEY, QDRANT_URL +
# QDRANT_API_KEY, and DATABASE_URL (the Neon connection string).
# Only /tmp/uploads is ephemeral — it just holds the uploaded file while it's being
# parsed, and isn't needed once the chunks are embedded into Qdrant.

services:
  - type: web
    name: ai-ta-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free # OpenAI embeddings keep runtime RAM under the free 512MB limit
    healthCheckPath: /health # FastAPI exposes GET /health for Render's probe
    envVars:
      # Neon Postgres connection string (free + permanent). Paste in the dashboard.
      - key: DATABASE_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false # set this in the Render dashboard
      - key: OPENAI_MODEL
        value: gpt-4o
      - key: LLM_PROVIDER
        value: openai
      - key: EMBEDDING_PROVIDER
        value: openai # API embeddings — no local model, fits the free tier
      # Vectors live in Qdrant Cloud, so they survive restarts (no disk on free).
      - key: VECTOR_STORE
        value: qdrant
      - key: QDRANT_URL
        sync: false # e.g. https://xxxx.cloud.qdrant.io:6333
      - key: QDRANT_API_KEY
        sync: false
      - key: JWT_SECRET_KEY
        generateValue: true
      # Signup email verification. Leave SMTP_USER/SMTP_PASSWORD unset to disable it
      # (signups are then auto-activated). Gmail needs an App Password, not the
      # account password.
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      # Only a scratch dir for the uploaded file during parsing — safe to be ephemeral.
      - key: UPLOAD_DIR
        value: /tmp/uploads
      # CORS: the backend also allows any *.onrender.com origin via regex (see
      # main.py), so this only needs changing if you add a custom domain.
      - key: FRONTEND_ORIGIN
        value: https://ai-ta-frontend.onrender.com

  # Frontend — static site (Vite build served from Render's CDN).
  - type: web
    name: ai-ta-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      # Baked into the Vite build at build time.
      # NOTE: `fromService … property: host` resolves to the *service name* only
      # (e.g. "ai-ta-backend-k7bj"), not the public hostname — which produced an
      # unresolvable baseURL. Set the public URL explicitly instead. If you rename
      # the backend service or use a custom domain, update this value.
      - key: VITE_API_URL
        value: https://ai-ta-backend-k7bj.onrender.com
    routes:
      # SPA fallback so React Router deep links resolve to index.html.
      - type: rewrite
        source: /*
        destination: /index.html

# No `databases:` block on purpose — Render's free Postgres expires after ~90 days.
# Postgres is Neon instead (free + permanent); paste its URL into DATABASE_URL.
