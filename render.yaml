# Render Blueprint — free-tier deploy (backend + static frontend + Postgres).
# Production LLM + embeddings are both OpenAI (set OPENAI_API_KEY in the dashboard).
# Using OpenAI embeddings means the local torch model never loads, so the backend
# fits Render's free 512MB tier. Trade-off: the free tier has NO persistent disk,
# so ChromaDB vectors + uploaded files live in ephemeral /tmp and are cleared when
# the service spins down or redeploys — re-upload documents after a restart.
# (Postgres persists, so accounts/courses/quizzes survive.)

services:
  - type: web
    name: ai-ta-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free # OpenAI embeddings keep runtime RAM under the free 512MB limit
    healthCheckPath: /health # FastAPI exposes GET /health for Render's probe
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ai-ta-db
          property: connectionString
      - key: OPENAI_API_KEY
        sync: false # set this in the Render dashboard
      - key: OPENAI_MODEL
        value: gpt-4o
      - key: LLM_PROVIDER
        value: openai
      - key: EMBEDDING_PROVIDER
        value: openai # API embeddings — no local model, fits the free tier
      - key: JWT_SECRET_KEY
        generateValue: true
      # Ephemeral (no persistent disk on the free tier); /tmp is always writable.
      - key: CHROMA_PERSIST_DIR
        value: /tmp/chroma
      - key: UPLOAD_DIR
        value: /tmp/uploads
      # CORS: the backend also allows any *.onrender.com origin via regex (see
      # main.py), so this only needs changing if you add a custom domain.
      - key: FRONTEND_ORIGIN
        value: https://ai-ta-frontend.onrender.com

  # Frontend — static site (Vite build served from Render's CDN).
  - type: web
    name: ai-ta-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      # Baked into the Vite build. Render resolves this to the backend's host
      # (no scheme); api.ts prepends https://. Auto-wired — no manual copy.
      - key: VITE_API_URL
        fromService:
          type: web
          name: ai-ta-backend
          property: host
    routes:
      # SPA fallback so React Router deep links resolve to index.html.
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: ai-ta-db
    plan: free # note: Render's free Postgres expires ~90 days after creation
